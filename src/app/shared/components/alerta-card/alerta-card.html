@if (alerta) {
  <div class="glass-card p-4 flex gap-3"
       [class.pulse-critico]="isCritica"
       [style.border-color]="isCritica ? 'rgba(239,68,68,0.4)' : 'rgba(245,158,11,0.3)'">
    <div class="text-2xl flex-shrink-0 mt-0.5">{{ tipoIcono }}</div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 mb-1 flex-wrap">
        <span class="font-display font-semibold text-sm" style="color: var(--color-text)">
          {{ alerta.municipio_nombre }}
        </span>
        <span class="px-2 py-0.5 rounded-full text-xs font-mono uppercase"
              [class]="isCritica ? 'badge-critico' : 'badge-medio'">
          {{ alerta.severidad }}
        </span>
        <span class="px-2 py-0.5 rounded-full text-xs"
              style="background: rgba(56,189,248,0.1); color: var(--color-accent); border: 1px solid var(--color-border)">
          {{ alerta.tipo }}
        </span>
      </div>
      <p class="text-xs leading-relaxed" style="color: var(--color-text-muted)">{{ alerta.descripcion }}</p>
    </div>
  </div>
}
